apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: fhir
  annotations:
    # This annotation ensures Projects (Namespaces) are created first when deployed via Argo CD
    argocd.argoproj.io/sync-wave: "-1"
spec:
  promotionPolicies:
    - stageSelector:
        name: common
      autoPromotionEnabled: true
