apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: common
  namespace: fhir
spec:
  subscriptions:
    warehouse: fhir-warehouse
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            repoURL: https://github.com/akuity/kargo-simple
            checkout:
              - branch: main
                path: ./common-cdk
        - uses: yaml-update
          config:
            path: ./common-cdk/applications.yaml
            updates:
              - key: Sources.fhir.Version
                value: ${{ imageFrom("fhir").Tag }}
        - uses: git-commit
          config:
            path: ./common-cdk
            message: "chore: auto-promote fhir to ${{ output(1).commit }}"
        - uses: git-push
          config:
            path: ./common-cdk
